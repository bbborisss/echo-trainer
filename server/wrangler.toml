name = "echo-chamber-api"
main = "src/index.js"
compatibility_date = "2026-07-01"

# Non-secret config. Secrets are set via `wrangler secret put`:
#   wrangler secret put COACH_API_KEY   (DeepSeek or other LLM provider key)
#   wrangler secret put ASR_API_KEY     (Groq key)
[vars]
# Which wire format the coach provider speaks: "openai" (DeepSeek, Groq,
# OpenRouter, Ollama, LM Studio, ...) or "anthropic".
COACH_FORMAT = "openai"
COACH_BASE_URL = "https://api.deepseek.com"
COACH_MODEL = "deepseek-chat"

ASR_BASE_URL = "https://api.groq.com/openai/v1"
ASR_MODEL = "whisper-large-v3-turbo"

# Comma-separated list of allowed browser origins, or "*" while developing.
ALLOWED_ORIGINS = "http://localhost:5173"

# Used in the daily teaser email.
SITE_URL = "http://localhost:5173"
API_URL = "http://localhost:8787"
EMAIL_FROM = "Echo Chamber <onboarding@resend.dev>"

# Game-state database. Before first deploy:
#   npx wrangler d1 create echo-chamber-db     -> paste database_id below
#   npx wrangler d1 execute echo-chamber-db --file=schema.sql
# (wrangler dev uses a local SQLite regardless of database_id)
[[d1_databases]]
binding = "DB"
database_name = "echo-chamber-db"
database_id = "REPLACE-AFTER-wrangler-d1-create"

# Daily teaser email, 13:00 UTC (~9am US East). Requires RESEND_API_KEY secret.
[triggers]
crons = ["0 13 * * *"]
